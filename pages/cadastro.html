<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Criar Conta — QA na Marra Store</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="logo">QA <span>na Marra</span> Store</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="produtos.html">Produtos</a>
    <a href="carrinho.html" class="cart-link">🛒 Carrinho <span class="cart-count" id="cartCount">0</span></a>
  </div>
</nav>

<div class="form-page">
  <div class="form-card">
    <h2>Criar Conta</h2>
    <p>Junte-se ao QA na Marra Store</p>

    <div class="form-error" id="registerError"></div>
    <div class="form-success" id="registerSuccess">Conta criada com sucesso! Redirecionando...</div>

    <div class="form-group">
      <label>Nome completo</label>
      <input type="text" id="regName" placeholder="Seu nome"/>
    </div>

    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="regEmail" placeholder="seu@email.com"/>
    </div>

    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres"/>
    </div>

    <div class="form-group">
      <label>Confirmar Senha</label>
      <!-- BUG: confirmar senha existe mas o JS não valida se são iguais -->
      <input type="password" id="regConfirm" placeholder="Repita a senha"/>
    </div>

    <!-- BUG: CPF aceita qualquer texto, sem validação de formato -->
    <div class="form-group">
      <label>CPF</label>
      <input type="text" id="regCpf" placeholder="000.000.000-00"/>
    </div>

    <button class="form-btn" onclick="handleRegister()">Criar Conta</button>

    <div class="form-link">
      Já tem conta? <a href="login.html">Entrar</a>
    </div>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
  updateCartCount();

  function handleRegister() {
    const name = document.getElementById('regName').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirm').value;

    const errorEl = document.getElementById('registerError');
    const successEl = document.getElementById('registerSuccess');

    errorEl.style.display = 'none';
    successEl.style.display = 'none';

    const result = register(name, email, password, confirm);

    if (result.success) {
      successEl.style.display = 'block';
      // BUG: redireciona para home em vez de login
      setTimeout(() => window.location.href = 'index.html', 1500);
    } else {
      errorEl.textContent = result.error;
      errorEl.style.display = 'block';
    }
  }
</script>
</body>
</html>
