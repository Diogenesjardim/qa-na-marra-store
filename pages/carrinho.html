<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carrinho — QA na Marra Store</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="logo">QA <span>na Marra</span> Store</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="produtos.html">Produtos</a>
    <a href="carrinho.html" class="cart-link">🛒 Carrinho <span class="cart-count" id="cartCount">0</span></a>
    <span id="navUser"></span>
    <a href="login.html" id="navLogin">Entrar</a>
    <a href="#" id="navLogout" style="display:none" onclick="logout()">Sair</a>
  </div>
</nav>

<div class="cart-page">
  <h1>🛒 Meu Carrinho</h1>

  <!-- BUG: cupom de desconto aceita qualquer código sem validar -->
  <div style="display:flex;gap:10px;margin-bottom:24px">
    <input type="text" id="couponInput" placeholder="Código de cupom (ex: QANAMAARRA10)"
      style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px 14px;color:var(--text);font-size:13px;flex:1;outline:none"/>
    <button onclick="applyCoupon()" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:6px;cursor:pointer;font-size:13px">
      Aplicar
    </button>
  </div>

  <div id="cartItems"></div>
  <div id="cartSummary"></div>
</div>

<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
  updateCartCount();
  updateNav();
  renderCart();

  function applyCoupon() {
    // BUG: aceita qualquer cupom e mostra mensagem de sucesso
    const code = document.getElementById('couponInput').value;
    if (code) {
      showToast(`✅ Cupom "${code}" aplicado! (bug: nenhum desconto é realmente aplicado)`);
    }
  }
</script>
</body>
</html>
